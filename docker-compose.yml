services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '5173:5173'
    environment:
      VITE_INVENTORY_PROXY_TARGET: http://inventory-service:8000
      VITE_CATALOG_PROXY_TARGET: http://catalog-service:8001
    depends_on:
      - inventory-service
      - catalog-service

  inventory-service:
    build:
      context: .
      dockerfile: inventory_service/Dockerfile
    ports:
      - '8000:8000'
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8001
    volumes:
      - inventory_data:/app/inventory_service/data

  catalog-service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    ports:
      - '8001:8001'
    environment:
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      DB_HOST: catalog-db
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - catalog-db

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - catalog_pg_data:/var/lib/postgresql/data

  config-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: config_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - config_pg_data:/var/lib/postgresql/data

  config-service:
    build:
      context: .
      dockerfile: services/config/Dockerfile
    ports:
      - '8008:8008'
    environment:
      DATABASE_URL_CONFIG: postgresql://postgres:postgres@config-db:5432/config_db
      DB_POOL_SIZE: 20
      DB_POOL_MAX_OVERFLOW: 40
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SQL_ECHO: 'false'
    depends_on:
      - config-db
    volumes:
      - ./services/config:/app

volumes:
  inventory_data:
  catalog_pg_data:
  config_pg_data: