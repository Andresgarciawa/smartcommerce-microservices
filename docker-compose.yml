services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '5173:5173'
    environment:
      VITE_INVENTORY_PROXY_TARGET: http://inventory-service:8000
      VITE_CATALOG_PROXY_TARGET: http://catalog-service:8001
    depends_on:
      - inventory-service
      - catalog-service

  inventory-service:
    build:
      context: .
      dockerfile: inventory_service/Dockerfile
    ports:
      - '8000:8000'
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8001
    volumes:
      - inventory_data:/app/inventory_service/data

  catalog-service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    ports:
      - '8004:8001'
    environment:
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      DB_HOST: catalog-db
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - catalog-db

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - catalog_pg_data:/var/lib/postgresql/data

  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8000"
    depends_on:
      - catalog
      - orders
      - pricing
    environment:
      - CATALOG_URL=http://catalog:8000
      - ORDERS_URL=http://orders:8000
      - PRICING_URL=http://pricing:8000

  catalog:
    build:
      context: ./services/catalog
    ports:
      - '8001:8000'

  orders:
    build:
      context: ./services/orders
    ports:
      - '8002:8000'

  pricing:
    build:
      context: ./services/pricing
    ports:
      - '8003:8000'

  enrichment-service:
    build:
      context: ./services/enrichment
      dockerfile: Dockerfile
    container_name: enrichment_container
    ports:
      - "8005:8000"
    volumes:
      - ./services/enrichment:/app
    environment:
      - DATABASE_URL=postgresql://user:pass@enrichment-db:5432/enrichment_db
    depends_on:
      - enrichment-db

  enrichment-db:
    image: postgres:15
    container_name: enrichment_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=enrichment_db
    ports:
      - "5434:5432"
  config-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: config_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - config_pg_data:/var/lib/postgresql/data

  config-service:
    build:
      context: .
      dockerfile: services/config/Dockerfile
    ports:
      - '8008:8008'
    environment:
      DATABASE_URL_CONFIG: postgresql://postgres:postgres@config-db:5432/config_db
      DB_POOL_SIZE: 20
      DB_POOL_MAX_OVERFLOW: 40
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SQL_ECHO: 'false'
    depends_on:
      - config-db
    volumes:
      - ./services/config:/app

volumes:
  inventory_data:
  catalog_pg_data:
  config_pg_data:
