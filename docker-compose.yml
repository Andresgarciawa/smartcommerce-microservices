version: '3.8'
#Servicio de enriquecimiento de datos
services:
  enrichment-service:
    build:
      context: ./services/enrichment
      dockerfile: Dockerfile
    container_name: enrichment_container
    ports:
      - "8005:8000"
    volumes:
      - ./services/enrichment:/app
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/enrichment_db
    networks:
      - smartcommerce-network

  #Base de datos del servicio enrichment
  db:
    image: postgres:15
    container_name: enrichment_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=enrichment_db
    ports:
      - "5432:5432"
    networks:
      - smartcommerce-network

networks:
  smartcommerce-network:
    driver: bridge
