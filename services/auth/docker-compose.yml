services:
  auth-service:
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    restart: always 
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: auth_users
    ports:
      - "5433:5432"
    # OPCIONAL: Puedes comentar el healthcheck si sigue dando problemas de lentitud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth_users"]
      interval: 5s
      timeout: 5s
      retries: 5 